name: Post publications to Bluesky

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:

jobs:
  post_to_bluesky:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy pyzotero requests beautifulsoup4 grapheme pytz atproto==0.0.56

      - name: Run Python Script
        env:
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: |
          python bluesky_posts/bluesky_publications_bot.py
    
        # Daily monitor
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nbconvert ipykernel feedparser fuzzywuzzy python-Levenshtein beautifulsoup4

      - name: Run daily monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python monitor.py