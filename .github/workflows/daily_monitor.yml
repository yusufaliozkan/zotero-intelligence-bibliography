name: Daily Monitor

on:
  schedule:
    - cron: '* 18 * * *'  # Runs once daily at 18:00 UTC
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests fuzzywuzzy python-Levenshtein beautifulsoup4 feedparser

      - name: Run monitor script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python monitor.py

      - name: Commit monitor results
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add monitor_future.csv monitor_last30.csv monitor_podcasts.csv monitor_magazines.csv monitor_other.csv
          git diff-index --quiet HEAD || git commit -m "Update monitor results"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}